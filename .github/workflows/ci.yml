name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ scripts/ --output-format=github
    
    - name: Format check with black
      run: |
        pip install black
        black --check src/ scripts/
    
    - name: Run system tests
      run: |
        python scripts/test_system.py
    
    - name: Test data generation
      run: |
        python -c "from src.data.pipeline import FloodDataGenerator; generator = FloodDataGenerator(); dataset = generator.generate_dataset(); print('Data generation test passed')"
    
    - name: Test model training
      run: |
        python -c "from src.models.flood_models import FloodPredictionModels; print('Model import test passed')"
    
    - name: Test visualization
      run: |
        python -c "from src.viz.visualization import FloodVisualizer; print('Visualization import test passed')"

  build-demo:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test Streamlit demo
      run: |
        python -c "import streamlit as st; print('Streamlit import test passed')"
    
    - name: Generate test data
      run: |
        python scripts/train_models.py --config configs/config.yaml
